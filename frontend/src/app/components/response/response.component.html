<mat-card class="response-card">
  <mat-card-content>
    <p class="answer">{{ response.answer }}</p>
    <mat-divider></mat-divider>
    <div class="meta-row">
      <span class="badge">{{ response.response_time_ms }}ms</span>
      @if (response.sources && response.sources.length > 0) {
        <button class="refs-btn" (click)="showSources = !showSources">
          <mat-icon>{{ showSources ? 'expand_less' : 'expand_more' }}</mat-icon>
          {{ response.sources.length }} fuente(s)
        </button>
      }
    </div>
    @if (showSources) {
      <div class="references">
        @for (src of response.sources; track $index) {
          <div class="ref-item">
            <mat-icon>description</mat-icon>
            <div>
              <strong>{{ src.filename }}</strong>
              <span class="score"> · {{ src.category }}</span>
              <p>Fragmento #{{ src.chunk_index }}</p>
            </div>
          </div>
        }
      </div>
    }
  </mat-card-content>
</mat-card>
